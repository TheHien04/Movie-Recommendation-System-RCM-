name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Movie_Recommend_System/web/package-lock.json

      - name: Build frontend
        working-directory: Movie_Recommend_System/web
        env:
          # Repo name ends with a dash: Movie-Recommendation-System-RCM-
          VITE_BASE_PATH: /Movie-Recommendation-System-RCM-/
          VITE_API_URL: https://cinemate-rcm-api.onrender.com
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Movie_Recommend_System/web/dist
