name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Movie_Recommend_System/web/package-lock.json

      - name: Build frontend
        working-directory: Movie_Recommend_System/web
        env:
          VITE_BASE_PATH: /Movie-Recommendation-System-RCM-/
          VITE_API_URL: https://cinemate-rcm-api.onrender.com
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Movie_Recommend_System/web/dist

      - id: deployment
        uses: actions/deploy-pages@v4
