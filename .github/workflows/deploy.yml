name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify production build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt
          cd Movie_Recommend_System/backend
          test -f artifacts/v1/manifest.json
          cd ../web
          npm ci
          npm run build
      - name: Deploy reminder
        run: |
          echo "Push is on main — sync Render Blueprint if not already:"
          echo "https://dashboard.render.com/blueprints"
          echo "Live target: https://cinemate-live.onrender.com"
