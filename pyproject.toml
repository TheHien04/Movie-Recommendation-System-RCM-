[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402", "F401"]
"app/services/*" = ["F401"]
"app/routes/users.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["Movie_Recommend_System/backend/tests"]
pythonpath = ["Movie_Recommend_System/backend"]

[tool.coverage.run]
source = ["app"]
omit = ["*/tests/*", "*/scripts/*"]
