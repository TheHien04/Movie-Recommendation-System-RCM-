<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemate Chatbot</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="navigationbar.css">
    <link rel="stylesheet" href="modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><img src="horizontal_logo.png" alt="Cinemate Logo"></div>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="genre.html">Thể loại</a></li>
                <li><a href="App.html">Chatbot</a></li>
                <li><a href="chatbot.html" class="active">Trò chuyện</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1 class="header">Trò chuyện với Cinemate</h1>
        <p class="subtitle">Mô tả sở thích của bạn — hệ thống hybrid ML sẽ gợi ý phim phù hợp.</p>
        <button id="newChatBtn" class="new-chat-btn" type="button">Cuộc trò chuyện mới</button>
        <button id="historyToggleBtn" class="history-toggle-btn" type="button">Lịch sử chat</button>
        <div id="historyPanel" class="chat-history-panel">
            <h3>Lịch sử</h3>
            <div id="historyEntries"></div>
        </div>
        <div id="chatContainer" class="chat-container">
            <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
            <input type="text" id="chatInput" class="search-input" placeholder="Ví dụ: phim kinh dị có Tom Hanks" aria-label="Nhập yêu cầu gợi ý phim">
        </div>
    </div>
    <div id="movieModal" class="modal" role="dialog" aria-modal="true" aria-label="Chi tiết phim"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="movieModal.js"></script>
</body>
</html>
