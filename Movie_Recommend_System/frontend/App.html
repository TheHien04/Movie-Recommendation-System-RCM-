<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemate — Gợi ý phim thông minh</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="App.css">
    <link rel="stylesheet" href="navigationbar.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><img src="horizontal_logo.png" alt="Cinemate Logo"></div>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="genre.html">Thể loại</a></li>
                <li><a href="App.html" class="active">Chatbot</a></li>
                <li><a href="chatbot.html">Trò chuyện</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h1 class="header">Cinemate Recommendation</h1>
        <p class="subtitle">Hệ thống gợi ý phim hybrid: Content-Based + Collaborative Filtering + NLP.</p>
        <button class="ask-movies-btn" type="button" onclick="goToChatbot()">Bắt đầu trò chuyện</button>

        <h2 class="subtitle">Gợi ý nhanh</h2>
        <div class="prompts-container">
            <button class="prompt-box" type="button" onclick="goToChatbotWithPrompt('Gợi ý phim hài')">Phim hài</button>
            <button class="prompt-box" type="button" onclick="goToChatbotWithPrompt('Phim có Leonardo DiCaprio')">Leonardo DiCaprio</button>
            <button class="prompt-box" type="button" onclick="goToChatbotWithPrompt('Phim đạo diễn Christopher Nolan')">Christopher Nolan</button>
            <button class="prompt-box" type="button" onclick="goToChatbotWithPrompt('Phim khoa học viễn tưởng hay nhất')">Khoa học viễn tưởng</button>
            <button class="prompt-box" type="button" onclick="goToChatbotWithPrompt('Phim kinh dị ngắn dưới 100 phút')">Kinh dị ngắn</button>
            <button class="prompt-box" type="button" onclick="goToChatbotWithPrompt('Phim về du hành thời gian')">Du hành thời gian</button>
        </div>

        <h2 class="subtitle">Phim nổi bật hôm nay</h2>
        <div class="movies-container" id="moviesList"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const moviesList = document.getElementById("moviesList");

            fetch(apiUrl("/random_movies"))
                .then((response) => response.json())
                .then((data) => {
                    moviesList.innerHTML = "";
                    (data.movies || []).forEach((movie) => {
                        const card = document.createElement("article");
                        card.className = "movie-card";
                        card.innerHTML = `
                            <img class="movie-poster" src="${escapeHtml(movie.poster)}" alt="${escapeHtml(movie.title)}" loading="lazy">
                            <h3 class="movie-title">${escapeHtml(movie.title)} (${escapeHtml(movie.year)})</h3>
                            <p class="movie-genre">${escapeHtml(movie.genre)}</p>
                            <p class="movie-ratings">⭐ ${escapeHtml(movie.imdb_rating)} | 🍅 ${escapeHtml(movie.rotten_rating)}</p>
                            <p class="movie-description">${escapeHtml(movie.description)}</p>
                        `;
                        moviesList.appendChild(card);
                    });
                })
                .catch(() => showToast("Không tải được phim nổi bật. Kiểm tra backend.", "error"));
        });

        function goToChatbot() {
            window.location.href = "chatbot.html";
        }

        function goToChatbotWithPrompt(prompt) {
            window.location.href = `chatbot.html?query=${encodeURIComponent(prompt)}`;
        }
    </script>
</body>
</html>
