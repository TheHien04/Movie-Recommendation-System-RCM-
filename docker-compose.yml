services:
  api:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - Movie_Recommend_System/backend/.env
    environment:
      FLASK_ENV: development
      PORT: "5001"
    volumes:
      - ./Movie_Recommend_System/backend/data:/movie_system/backend/data

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://127.0.0.1:5001
    volumes:
      - ./Movie_Recommend_System/web:/app
