# Deploy: Render → Blueprints → Cinemate → Manual sync
# App URL:  https://cinemate-web.onrender.com
# API URL:  https://cinemate-rcm-api.onrender.com

services:
  - type: web
    name: cinemate-rcm-api
    runtime: python
    plan: free
    buildCommand: bash deploy/render-build-api-lean.sh
    startCommand: cd Movie_Recommend_System/backend && gunicorn -b 0.0.0.0:$PORT -w 1 --timeout 180 app:app
    healthCheckPath: /api/health/live
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://cinemate-web.onrender.com,https://cinemate-web.onrender.com/,http://localhost:5173
      - key: TMDB_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: cinemate-web
    runtime: static
    buildCommand: bash deploy/render-build-web-static.sh
    staticPublishPath: Movie_Recommend_System/web/dist
    envVars:
      - key: NODE_VERSION
        value: "22.16.0"
