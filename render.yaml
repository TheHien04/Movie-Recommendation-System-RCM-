# API on Render (Docker, lean). Frontend on GitHub Pages (auto via CI).
# App:  https://thehien04.github.io/Movie-Recommendation-System-RCM-/
# API:  https://cinemate-rcm-api.onrender.com

services:
  - type: web
    name: cinemate-rcm-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/live
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://thehien04.github.io,https://cinemate-web.onrender.com,http://localhost:5173
      - key: TMDB_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
