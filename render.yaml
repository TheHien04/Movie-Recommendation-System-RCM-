# Unified Cinemate: API + SPA on one URL
# Live: https://cinemate-live.onrender.com
# After push: Render Dashboard → Blueprints → Manual Sync

databases:
  - name: cinemate-db
    plan: free
    databaseName: cinemate
    user: cinemate

services:
  - type: web
    name: cinemate-live
    runtime: python
    plan: free
    buildCommand: bash deploy/render-build-unified.sh
    startCommand: cd Movie_Recommend_System/backend && gunicorn -b 0.0.0.0:$PORT -w 1 --threads 2 --timeout 180 --preload app:app
    healthCheckPath: /api/health/live
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "22.16.0"
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://cinemate-live.onrender.com,https://thehien04.github.io,http://localhost:5173,http://127.0.0.1:5173
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://cinemate-live.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cinemate-db
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
